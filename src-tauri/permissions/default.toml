[permission.commands]
allow = ["check_network_status"]

[[permission]]
identifier = "allow-set-cache-online-status"
description = "Enables setting cache online status"
[permission.commands]
allow = ["set_cache_online_status"]

[[permission]]
identifier = "allow-clear-web-cache"
