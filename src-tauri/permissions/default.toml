allow = ["get_offline_server_url"]

[[permission]]
identifier = "allow-is-offline-server-ready"
description = "Enables checking if the offline server is ready"
[permission.commands]
allow = ["is_offline_server_ready"]

[[permission]]
identifier = "allow-precache-app"
