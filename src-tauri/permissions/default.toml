[permission.commands]
allow = ["clear_web_cache"]

[[permission]]
identifier = "allow-get-web-cache-stats"
description = "Enables getting web cache statistics"
[permission.commands]
allow = ["get_web_cache_stats"]

[[permission]]
identifier = "allow-get-offline-server-url"
